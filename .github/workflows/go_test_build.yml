name: Build, Test & Smoke

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Install Task
        uses: arduino/setup-task@v1

      - name: Run stack coverage
        run: task coverage:stack

      - name: Frontend smoke
        run: task test:frontend

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profiles
          path: |
            coverage/
            collector/coverage.out
            server/coverage.out
            infra/coverage.out

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: |
            coverage/combined.out
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Install Task
        uses: arduino/setup-task@v1

      - name: Build collector and server
        run: task build:all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/collector
            dist/main
            dist/main.zip

  smoke-clickhouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Install Task
        uses: arduino/setup-task@v1

      - name: Install clickhouse-local
        run: bash ./hack/install-clickhouse-local.sh

      - name: Add local bin directory to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run ClickHouse smoke tests
        run: task smoke:clickhouse
