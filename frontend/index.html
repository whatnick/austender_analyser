<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austender Analyser Chat</title>
    <!-- Environment config -->
    <script src="./config.local.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/markdown-it-mathjax3@4.3.2/dist/markdown-it-mathjax3.min.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
        <script>
            // MathJax v3 configuration matching Markdown Monster reference
            window.MathJax = {
                tex: {
                    inlineMath: [['$','$'], ['\\(','\\)']],
                    displayMath: [['$$','$$'], ['\\[','\\]']],
                    processEscapes: true
                },
                svg: { fontCache: 'global' },
                options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
            };
        </script>
        <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #f7f9fc 0%, #eef2f7 100%); }
        .chat-card { box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); border: none; }
        .chat-log { height: 400px; overflow-y: auto; padding: 1rem; background: #fff; border-radius: 0.5rem; border: 1px solid #e5e7eb; }
        .msg { margin-bottom: 1rem; }
        .msg .role { font-weight: 600; color: #0d6efd; }
        .msg.assistant .role { color: #20c997; }
        .context { font-size: 0.85rem; color: #6c757d; margin-top: 0.25rem; }
        .pill { display: inline-block; padding: 0.35rem 0.6rem; border-radius: 999px; background: #0d6efd; color: #fff; font-size: 0.8rem; }
    </style>
</head>
<body class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex align-items-center mb-3">
                <div class="pill me-2">Chat</div>
                <h1 class="m-0">Austender Analyser</h1>
                <a href="search.html" class="btn btn-outline-success btn-sm ms-auto">🔍 Search Mode</a>
            </div>
            <p class="text-muted">Ask spend questions in plain text.</p>

            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="toggle-cache" checked>
                <label class="form-check-label" for="toggle-cache">Use ducklake cache</label>
            </div>

            <div class="small text-muted mb-3" id="backend-info">LLM backend: detecting…</div>

            <div class="card chat-card mb-3">
                <div class="card-body">
                    <div id="chat-log" class="chat-log" aria-live="polite"></div>
                    <form id="chat-form" class="mt-3" hx-ext="json-enc" hx-encoding="json" hx-swap="none">
                        <div class="mb-3">
                            <label class="form-label">Tender Source</label>
                            <div class="d-flex flex-wrap gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="source" id="source-federal" value="federal" checked>
                                    <label class="form-check-label" for="source-federal">Federal</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="source" id="source-vic" value="vic">
                                    <label class="form-check-label" for="source-vic">VIC</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="source" id="source-nsw" value="nsw">
                                    <label class="form-check-label" for="source-nsw">NSW</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="source" id="source-qld" value="qld">
                                    <label class="form-check-label" for="source-qld">QLD</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="source" id="source-sa" value="sa">
                                    <label class="form-check-label" for="source-sa">SA</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="source" id="source-wa" value="wa">
                                    <label class="form-check-label" for="source-wa">WA</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="source" id="source-auto" value="">
                                    <label class="form-check-label" for="source-auto">Auto-detect</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3 d-none" id="model-picker">
                            <label class="form-label" for="model-select">Model</label>
                            <select class="form-select" id="model-select" name="model"></select>
                            <div class="form-text" id="model-provider"></div>
                        </div>

                        <label for="prompt" class="form-label">Your question</label>
                        <textarea id="prompt" name="prompt" class="form-control" rows="3" placeholder="e.g., How much was spent by Department of Defence?" required></textarea>

                        <div class="mt-3">
                            <label for="lookback" class="form-label d-flex justify-content-between">
                                <span>Lookback window (years)</span>
                                <span class="fw-semibold" id="lookback-value">20</span>
                            </label>
                            <input type="range" class="form-range" id="lookback" name="lookback" min="1" max="30" value="20" step="1">
                            <div class="form-text">Adjust the number of past years to use when calling MCP tools.</div>
                        </div>

                        <div class="d-flex align-items-center mt-3">
                            <button type="submit" class="btn btn-primary" id="sendBtn">
                                <span class="spinner-border spinner-border-sm htmx-indicator me-2" role="status" aria-hidden="true"></span>
                                Send
                            </button>
                            <div class="ms-3 text-muted" id="status-msg"></div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="small text-muted">Requests POST to `/api/llm`.</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var apiBase = (window.APP_CONFIG && window.APP_CONFIG.apiBase) || 'http://localhost:8080';
            var form = document.getElementById('chat-form');
            var promptEl = document.getElementById('prompt');
            var logEl = document.getElementById('chat-log');
            var sendBtn = document.getElementById('sendBtn');
            var statusEl = document.getElementById('status-msg');
            var toggleCache = document.getElementById('toggle-cache');
            var lookbackInput = document.getElementById('lookback');
            var lookbackValueEl = document.getElementById('lookback-value');
            var modelPicker = document.getElementById('model-picker');
            var modelSelect = document.getElementById('model-select');
            var modelProvider = document.getElementById('model-provider');
            var backendInfo = document.getElementById('backend-info');
            var modelsLoaded = false;
            var defaultModel = null;
            var MAX_MODEL_ATTEMPTS = 6;
            var MODEL_RETRY_DELAY_MS = 1000;
            if (backendInfo) backendInfo.textContent = 'LLM backend: detecting…';

            function updateLookbackLabel(val) {
                lookbackValueEl.textContent = val;
            }
            lookbackInput.addEventListener('input', function() {
                updateLookbackLabel(this.value);
            });
            updateLookbackLabel(lookbackInput.value);

            async function loadModels(attempt) {
                if (!modelPicker || !modelSelect) return;
                if (modelsLoaded) return;
                attempt = attempt || 0;
                try {
                    var res = await fetch(apiBase.replace(/\/$/, '') + '/api/llm/models');
                    if (!res.ok) throw new Error('status ' + res.status);
                    var data = await res.json();
                    var backend = (data && data.backend) || 'unknown';
                    defaultModel = (data && data.defaultModel) ? (data.defaultModel || null) : null;
                    if (backendInfo) {
                        var label = backend.charAt(0).toUpperCase() + backend.slice(1);
                        var endpointNote = (data && data.endpoint) ? ' (' + data.endpoint + ')' : '';
                        backendInfo.textContent = 'LLM backend: ' + label + endpointNote;
                    }
                    if (backend !== 'ollama') {
                        if (modelPicker) modelPicker.classList.add('d-none');
                        modelsLoaded = true;
                        return;
                    }
                    if (!Array.isArray(data.models)) {
                        throw new Error('invalid models payload');
                    }
                    modelSelect.innerHTML = '';
                    var defaultSet = false;
                    data.models.forEach(function(model) {
                        if (!model || !model.name) return;
                        var opt = document.createElement('option');
                        opt.value = model.name;
                        opt.textContent = model.display || model.name;
                        if (!defaultSet && model.default) {
                            opt.selected = true;
                            defaultSet = true;
                        }
                        modelSelect.appendChild(opt);
                    });
                    if (!defaultSet && data.defaultModel) {
                        for (var i = 0; i < modelSelect.options.length; i++) {
                            if (modelSelect.options[i].value === data.defaultModel) {
                                modelSelect.options[i].selected = true;
                                defaultSet = true;
                                break;
                            }
                        }
                    }
                    if (!defaultSet && modelSelect.options.length > 0) {
                        modelSelect.options[0].selected = true;
                    }
                    if (data.models.length === 0) {
                        var opt = document.createElement('option');
                        opt.value = '';
                        opt.textContent = 'No models installed';
                        modelSelect.appendChild(opt);
                        modelSelect.disabled = true;
                        if (modelProvider) {
                            var hostHint = (data && data.endpoint) ? data.endpoint : 'configured host';
                            modelProvider.textContent = 'Ollama detected (' + hostHint + ') but no models were found. Run `ollama pull <model>` and refresh.';
                        }
                    } else {
                        modelSelect.disabled = false;
                        if (modelProvider) {
                            var hostText = (data && data.endpoint) ? data.endpoint : 'configured host';
                            modelProvider.textContent = 'Ollama host: ' + hostText;
                        }
                    }
                    modelPicker.classList.remove('d-none');
                    modelsLoaded = true;
                } catch (err) {
                    console.warn('Failed to load LLM models', err);
                    if (backendInfo) {
                        backendInfo.textContent = 'LLM backend: detecting… (retry ' + Math.min(attempt + 1, MAX_MODEL_ATTEMPTS - 1) + ')';
                    }
                    if (attempt + 1 < MAX_MODEL_ATTEMPTS) {
                        setTimeout(function() { loadModels(attempt + 1); }, MODEL_RETRY_DELAY_MS);
                    } else {
                        if (backendInfo) backendInfo.textContent = 'LLM backend: unavailable (see console)';
                    }
                }
            }

            // Rich renderer: markdown-it + mathjax3 + DOMPurify with re-render once deps load
            var md;
            var pendingRenders = [];
            function tryInitRenderer() {
                if (!md && window.markdownit && window.markdownitMathjax3 && window.DOMPurify && window.MathJax) {
                    md = window.markdownit({
                        html: false,
                        linkify: true,
                        breaks: true
                    }).use(window.markdownitMathjax3);
                    flushPending();
                }
            }
            function normalizeMathDelimiters(text) {
                if (!text) return text;
                // Convert \[ ... \] to $$ ... $$ for consistent katex parsing.
                return text.replace(/\\\[/g, '$$').replace(/\\\]/g, '$$');
            }

            function renderInto(el, text) {
                if (!text) {
                    el.innerHTML = '';
                    return;
                }
                var source = normalizeMathDelimiters(text);
                if (!md) {
                    el.textContent = source;
                    pendingRenders.push({ el: el, text: source });
                    return;
                }
                el.innerHTML = window.DOMPurify.sanitize(md.render(source));
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise([el]).catch(function(err){ console.warn('MathJax render failed', err); });
                }
            }
            function flushPending() {
                if (!md) return;
                pendingRenders.forEach(function(item) {
                    item.el.innerHTML = window.DOMPurify.sanitize(md.render(item.text));
                });
                pendingRenders = [];
            }
            // Poll briefly until renderer is ready (deferred scripts)
            var rendererInterval = setInterval(function() {
                tryInitRenderer();
                if (md) clearInterval(rendererInterval);
            }, 50);
            setTimeout(function(){ if (!md) tryInitRenderer(); }, 2000);

            function appendMessage(role, text, context) {
                var wrapper = document.createElement('div');
                wrapper.className = 'msg ' + role.toLowerCase();

                var roleEl = document.createElement('div');
                roleEl.className = 'role';
                roleEl.textContent = role;

                var textEl = document.createElement('div');
                renderInto(textEl, text);

                wrapper.appendChild(roleEl);
                wrapper.appendChild(textEl);

                if (context) {
                    var ctxEl = document.createElement('div');
                    ctxEl.className = 'context';
                    renderInto(ctxEl, 'Context: ' + context);
                    wrapper.appendChild(ctxEl);
                }

                logEl.appendChild(wrapper);
                logEl.scrollTop = logEl.scrollHeight;
            }

            async function sendPrompt(prompt) {
                var lookbackPeriod = parseInt(lookbackInput.value, 10) || 20;
                var source = form.querySelector('input[name="source"]:checked').value;
                var payload = {
                    prompt: prompt,
                    source: source,
                    lookbackPeriod: lookbackPeriod,
                    useCache: !!toggleCache.checked,
                    agent: true
                };
                if (modelPicker && !modelPicker.classList.contains('d-none') && modelSelect) {
                    payload.model = (modelSelect.value || '').trim();
                } else if (defaultModel) {
                    payload.model = defaultModel;
                }

                statusEl.textContent = 'Sending...';
                sendBtn.disabled = true;
                try {
                    var res = await fetch(apiBase.replace(/\/$/, '') + '/api/llm', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    var data = await res.json();
                    if (data.error) {
                        appendMessage('Assistant', 'Error: ' + data.error, data.context);
                    } else {
                        appendMessage('Assistant', data.result || '[no result]', data.context);
                    }
                } catch (err) {
                    appendMessage('Assistant', 'Error: ' + err.message);
                } finally {
                    sendBtn.disabled = false;
                    statusEl.textContent = '';
                }
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                var prompt = (promptEl.value || '').trim();
                if (!prompt) return;
                appendMessage('You', prompt);
                promptEl.value = '';
                sendPrompt(prompt);
            });

            loadModels(0);
        });
    </script>
</body>
</html>
