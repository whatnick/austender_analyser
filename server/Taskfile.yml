# https://taskfile.dev

version: '3'

vars:
  GREETING: Hello, World!

env:
  GOTOOLCHAIN: go1.25.5

tasks:

  

  build:
    desc: build go
    cmds:
      - env GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../dist/main .
      - chmod +x ../dist/main
      - cd ../dist && zip main.zip main
    sources:
      - ./*.go
      - main/*.go
      - Taskfile.yml
    generates:
      - ../dist/main
    silent: true

  fastdeploy:
    desc: Deploy only lambda
    deps: [build]
    vars:
      FN:      
        sh: aws ssm get-parameter --name "austender" --query "Parameter.Value" --output text
    cmds:
      - aws lambda update-function-code --function-name  {{.FN}} --zip-file fileb://../dist/main.zip

  test:
    desc: all go test
    cmds:
      - go test ./... -covermode=atomic -coverprofile=coverage.out -v

  coverage:
    desc: Server coverage (atomic)
    deps: [test]
    cmds:
      - go tool cover -func=coverage.out | tail -n 1

  tidy:
    desc: Go mod tidy
    cmds:
      - go mod tidy