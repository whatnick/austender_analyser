# https://taskfile.dev

version: '3'

env:
  GOTOOLCHAIN: go1.25.5

tasks:
  test:
    desc: Run infra tests
    cmds:
      - go test ./... -covermode=atomic -coverprofile=coverage.out -v

  coverage:
    desc: Infra coverage (atomic)
    deps: [test]
    cmds:
      - go tool cover -func=coverage.out | tail -n 1

  tidy:
    desc: Go mod tidy
    cmds:
      - go mod tidy

  synth:
    desc: Synthesize CDK app
    cmds:
      - cdk synth

  deploy:
    desc: Deploy the CDK stack (no approval prompts)
    cmds:
      - cdk deploy --require-approval never

  destroy:
    desc: Destroy the CDK stack (force without prompt)
    cmds:
      - cdk destroy -f
