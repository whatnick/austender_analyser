# https://taskfile.dev

version: '3'

env:
  AWS_DEFAULT_REGION: ap-southeast-1
  CDK_DEFAULT_REGION: ap-southeast-1
  CDK_DEFAULT_ACCOUNT: 
    sh: |
      if command -v aws >/dev/null 2>&1; then
        aws sts get-caller-identity --query Account --output text 2>/dev/null || true
      else
        echo ""
      fi
  GOTOOLCHAIN: go1.25.5


includes:
  server:
    taskfile: ./server/Taskfile.yml
    dir: ./server
  infra:
    taskfile: ./infra/Taskfile.yml
    dir: ./infra
  collector:
    taskfile: ./collector/Taskfile.yml
    dir: ./collector
tasks:
  run:server:
    desc: Run the local API server on :8080
    cmds:
      - bash ./hack/run-server.sh

  stop:server:
    desc: Stop the local API server (uses cached pid) and verify :8080 is free
    cmds:
      - bash ./hack/stop-server.sh

  run:frontend:
    desc: Open the minimal HTMX frontend
    cmds:
      - bash ./hack/run-frontend.sh

  run:local:
    desc: Start server and open frontend
    cmds:
      - bash ./hack/run-local.sh

  stop:local:
    desc: Stop local dev processes (server) and verify :8080 is free
    cmds:
      - bash ./hack/stop-local.sh

  test:all:
    desc: Run tests across collector, server, and infra with merged coverage
    cmds:
      - task: coverage:stack

  coverage:collector:
    desc: Run collector coverage and stage profile into ./coverage
    cmds:
      - task: collector:test
      - mkdir -p coverage
      - cp collector/coverage.out coverage/collector.coverage.out

  coverage:server:
    desc: Run server coverage and stage profile into ./coverage
    cmds:
      - task: server:test
      - mkdir -p coverage
      - cp server/coverage.out coverage/server.coverage.out

  coverage:infra:
    desc: Run infra coverage and stage profile into ./coverage
    cmds:
      - task: infra:test
      - mkdir -p coverage
      - cp infra/coverage.out coverage/infra.coverage.out

  coverage:merge:
    desc: Merge staged coverage profiles into coverage/combined.out
    cmds:
      - |
        set -euo pipefail
        coverage_dir="coverage"
        combined="${coverage_dir}/combined.out"
        if [ ! -d "$coverage_dir" ]; then
          echo "coverage directory missing; run coverage staging tasks first" >&2
          exit 1
        fi
        echo "mode: atomic" > "$combined"
        for profile in "$coverage_dir"/*.coverage.out; do
          [ -e "$profile" ] || continue
          tail -n +2 "$profile" >> "$combined"
        done
        echo "Merged coverage profile written to $combined"

  coverage:stack:
    desc: Run coverage across collector, server, infra and merge into coverage/combined.out
    cmds:
      - rm -rf coverage
      - mkdir -p coverage
      - task: coverage:collector
      - task: coverage:server
      - task: coverage:infra
      - task: coverage:merge

 